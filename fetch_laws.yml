name: 법령 자동 수집

on:
  # 반기 1회 — 1월 1일 / 7월 1일 오전 9시(KST)
  schedule:
    - cron: "0 0 1 1 *"   # 1월 1일 00:00 UTC
    - cron: "0 0 1 7 *"   # 7월 1일 00:00 UTC
  # 수동 실행 (GitHub UI → Actions → Run workflow)
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "기존 파일 무시하고 전체 재수집"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clear existing docs (force refresh)
        if: ${{ github.event.inputs.force_refresh == 'true' }}
        run: |
          rm -rf docs/law docs/admrul docs/ordin docs/.manifest.json
          echo "기존 본문 파일 및 매니페스트 삭제 완료"

      - name: Fetch laws
        id: fetch
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        run: |
          python scripts/fetch_laws.py
          # 스크립트가 종료 코드 2를 반환하면 "변경 없음"
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push (변경 시에만)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/ fetch_laws.log
          if git diff --cached --quiet; then
            echo "변경된 파일 없음 — 커밋 스킵"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date "+%Y-%m-%d %H:%M KST")
            NEW=$(git diff --cached --name-only | grep -c "\.md$" || true)
            git commit -m "chore: 법령 수집 ${TIMESTAMP} (변경 ${NEW}건)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "### 수집 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          LAW_CNT=$(find docs/law    -name "*.md" 2>/dev/null | wc -l || echo 0)
          ADM_CNT=$(find docs/admrul -name "*.md" 2>/dev/null | wc -l || echo 0)
          ORD_CNT=$(find docs/ordin  -name "*.md" 2>/dev/null | wc -l || echo 0)
          TOTAL=$((LAW_CNT + ADM_CNT + ORD_CNT))
          echo "| 구분 | 건수 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📘 법령 | ${LAW_CNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📙 행정규칙 | ${ADM_CNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📗 자치법규 | ${ORD_CNT} |" >> $GITHUB_STEP_SUMMARY
          echo "| **합계** | **${TOTAL}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          tail -20 fetch_laws.log >> $GITHUB_STEP_SUMMARY || true
